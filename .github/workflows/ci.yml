name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend lint/syntax checks
        working-directory: backend
        run: npm run check

  tests:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: togetherhere_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d togetherhere_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/togetherhere_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/togetherhere_test
      NODE_ENV: test
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      CSRF_COOKIE_SECURE: 'false'
      SESSION_COOKIE_SECURE: 'false'
      AUTH_RATE_LIMIT_WINDOW_MS: '900000'
      AUTH_RATE_LIMIT_BASE_BACKOFF_MS: '1000'
      AUTH_RATE_LIMIT_MAX_BACKOFF_MS: '60000'
      AUTH_RATE_LIMIT_LOCKOUT_THRESHOLD: '10'
      AUTH_RATE_LIMIT_LOCKOUT_MS: '900000'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Apply DB migrations for test database
        run: ./scripts/db-migrate.sh

      - name: Run Node.js unit/integration tests in CI parity mode
        working-directory: backend
        run: npm run test:ci-parity

  migration-validation:
    name: Migration Validation
    runs-on: ubuntu-latest
    needs: tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: togetherhere_ci
          POSTGRES_USER: togetherhere
          POSTGRES_PASSWORD: togetherhere
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U togetherhere -d togetherhere_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate migrations against fresh database
        env:
          DATABASE_URL: postgres://togetherhere:togetherhere@localhost:5432/togetherhere_ci
        run: ./scripts/db-migrate.sh

  build-artifact:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: migration-validation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Package deployable artifact
        run: |
          mkdir -p dist
          tar -czf dist/togetherhere-app.tar.gz \
            backend \
            db \
            scripts \
            assets \
            index.html \
            activities.html \
            README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: togetherhere-app
          path: dist/togetherhere-app.tar.gz
          if-no-files-found: error
