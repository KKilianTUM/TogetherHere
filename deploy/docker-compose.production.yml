version: '3.9'

services:
  api:
    image: togetherhere/backend:latest
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      AUTH_REFRESH_TOKEN_SECRET: ${AUTH_REFRESH_TOKEN_SECRET}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN}
      CSRF_COOKIE_DOMAIN: ${CSRF_COOKIE_DOMAIN}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME}
      CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE}
      SESSION_COOKIE_PATH: ${SESSION_COOKIE_PATH}
      CSRF_COOKIE_PATH: ${CSRF_COOKIE_PATH}
      ALLOWED_FRONTEND_ORIGIN: ${ALLOWED_FRONTEND_ORIGIN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL}
