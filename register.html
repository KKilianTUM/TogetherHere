<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TogetherHere — Register</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/styles/main.css" />
  <link rel="stylesheet" href="assets/styles/login.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html" aria-label="Go to home page">
        <img class="logo-img" src="/images/logo1-TH.jpeg" alt="TogetherHere logo" width="36" height="36" loading="eager" decoding="async" />
        <span class="brand-name" aria-label="TogetherHere">
          <span class="together">Together</span><span class="here">Here</span>
        </span>
      </a>
      <a class="btn btn-ghost" href="login.html">Already have account? Log in</a>
    </div>
  </header>

  <main class="container login-main">
    <section class="login-layout">
      <div class="login-copy card">
        <h1>Create your account</h1>
        <p>Use your email and a strong password to create an account. You can log in right away after successful registration.</p>
      </div>

      <form class="login-form card" id="registerForm" novalidate aria-describedby="registerFormState">
        <h2>Register</h2>

        <label class="line-field" for="registerDisplayNameInput">
          <span>Display name</span>
          <input id="registerDisplayNameInput" name="displayName" type="text" autocomplete="name" required minlength="2" maxlength="50" placeholder="Your name" aria-describedby="registerDisplayNameError" />
          <span class="field-error" id="registerDisplayNameError" role="alert"></span>
        </label>

        <label class="line-field" for="registerEmailInput">
          <span>Email</span>
          <input id="registerEmailInput" name="email" type="email" autocomplete="email" required placeholder="you@example.com" aria-describedby="registerEmailError" />
          <span class="field-error" id="registerEmailError" role="alert"></span>
        </label>

        <label class="line-field" for="registerPasswordInput">
          <span>Password</span>
          <input id="registerPasswordInput" name="password" type="password" autocomplete="new-password" required minlength="12" maxlength="128" placeholder="Create a password" aria-describedby="registerPasswordHint registerPasswordError" />
          <span class="field-hint" id="registerPasswordHint">12-128 chars with uppercase, lowercase, number, and symbol.</span>
          <span class="field-error" id="registerPasswordError" role="alert"></span>
        </label>

        <p class="form-state" id="registerFormState" aria-live="polite"></p>

        <button class="btn btn-primary login-submit" id="registerSubmitBtn" type="submit">Create account</button>
      </form>
    </section>
  </main>

  <script src="assets/js/register.js" type="module"></script>
</body>
</html>
